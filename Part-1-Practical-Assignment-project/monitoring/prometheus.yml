global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Flask app metrics (exposed by prometheus-flask-exporter at /metrics)
  - job_name: "flask-app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:5000"]
    scrape_interval: 10s
